                    ))}
                  </div>
                  {form.pagamento === 'pix' && (
                    <div className="pix-info">
                      Envie o comprovante após o pedido.<br />
                      <span style={{ fontSize: '.72rem', color: 'rgba(245,240,232,.6)' }}>Chave PIX:</span>
                      <div className="pix-key-row">
                        <div className="pix-key">{PIX_KEY}</div>
                        <button type="button" className="btn-copy" onClick={async () => { await copyText(PIX_KEY); showToast('Chave PIX copiada'); }}>
                          Copiar
                        </button>
                      </div>
                    </div>
                  )}
                  {form.pagamento === 'dinheiro' && (
                    <div className="form-group" style={{ marginTop: 8 }}>
                      <label>Valor para troco</label>
                      <input inputMode="decimal" value={form.troco} onChange={e => setF('troco', e.target.value.replace(/[^\d,.]/g, '').slice(0, 12))} placeholder="Ex.: 100,00" />
                    </div>
                  )}
                  {!isRetirada && form.pagamento === 'cartao' && (
                    <div className="form-group" style={{ marginTop: 10 }}>
                      <label>Máquina de cartão na entrega *</label>
                      <select value={form.maquinaCartao} onChange={e => setF('maquinaCartao', e.target.value)}>
                        <option value="">Selecione</option>
                        <option value="sim">Sim, preciso passar cartão</option>
                        <option value="nao">Não / combinarei outro meio no WhatsApp</option>
                      </select>
                      <span className="form-hint">Ajuda a loja a enviar ou não a maquininha no motoboy.</span>
                    </div>
                  )}
                </div>
                <div className="form-group">
                  <label>Observações</label>
                  <textarea rows="2" value={form.obs} onChange={e => setF('obs', e.target.value)} placeholder="Observações gerais do pedido (além das notas por item no hortifruti)" />
                </div>
                <div className="order-summary">
                  <strong className="order-summary-title">Resumo do pedido:</strong>
                  <table className="summary-table">
                    <thead>
                      <tr>
                        <th className="summary-prod">Produto</th>
                        <th className="summary-qty">Qtd.</th>
                        <th className="summary-val">Valor</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[...Object.values(cart)].sort((a, b) => a.item.nome.localeCompare(b.item.nome)).map(({ item, qty, obs }) => (
                        <tr key={item.id}>
                          <td className="summary-prod">
                            {item.nome}
                            {obs && String(obs).trim() ? <div style={{ fontSize: '.72rem', color: 'var(--ts)', marginTop: 4 }}>Obs.: {String(obs).trim()}</div> : null}
                          </td>
                          <td className="summary-qty">{formatQty(item, qty)}</td>
                          <td className="summary-val">{fmtBRL(item.preco * qty)}</td>
                        </tr>
                      ))}
                      <tr>
                        <td className="summary-prod" colSpan="2">Subtotal</td>
                        <td className="summary-val">{fmtBRL(subtotal)}</td>
                      </tr>
                      <tr>
                        <td className="summary-prod" colSpan="2">{isRetirada ? 'Retirada na loja' : `Frete${freteBairro ? ` (${freteBairro})` : ''}`}</td>
                        <td className="summary-val">{isRetirada ? fmtBRL(0) : (frete !== null ? fmtBRL(frete) : 'Calcular')}</td>
                      </tr>
                    </tbody>
                  </table>
                  <div className="summary-total-row">
                    <strong>Total</strong><strong>{isRetirada || frete !== null ? fmtBRL(total) : 'Calcule o frete'}</strong>
                  </div>
                </div>
              </div>
              <div className="cart-foot" style={{ paddingTop: 14 }}>
                <button className="btn-wa" onClick={enviarWA}>
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" /></svg>
                  Enviar Pedido pelo WhatsApp
                </button>
              </div>
            </>
          )}
        </>
      );
    }

    const STORE_SLIDES = [
      {
        src: 'images/Copilot_20260424_200742.png',
        alt: 'Fachada da Vida Pura Mercearia com entrada aberta',
        kicker: 'Chegada',
        title: 'A fachada que convida a entrar',
        text: 'Um primeiro olhar para a loja, com a porta aberta e o clima de mercearia de bairro.',
        pos: 'center center',
      },
      {
        src: 'images/DSC05491.jpg.jpeg',
        alt: 'Ambiente interno da Vida Pura Mercearia com produtos e logo na parede',
        kicker: 'Dentro da loja',
        title: 'Produtos escolhidos de perto',
        text: 'Prateleiras, hortifruti e detalhes que mostram o cuidado diário com cada escolha.',
        pos: 'center center',
      },
      {
        src: 'images/IMG_1072.jpg.jpeg',
        alt: 'Letreiro de orgânicos em parede verde',
        kicker: 'Identidade',
        title: 'Orgânicos no centro da experiência',
        text: 'O verde, o frescor e a proposta da Vida Pura antes mesmo de colocar algo na cesta.',
        pos: 'center center',
      },
    ];

    function StoreCarousel() {
      const [active, setActive] = useState(0);
      const total = STORE_SLIDES.length;
      const goTo = index => setActive((index + total) % total);
      const next = useCallback(() => setActive(index => (index + 1) % total), [total]);
      const prev = () => setActive(index => (index - 1 + total) % total);

      useEffect(() => {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (prefersReducedMotion) return;
        const timer = window.setInterval(next, 5200);
        return () => window.clearInterval(timer);
      }, [next]);

      return (
        <section className="loja-tour">
          <div className="loja-tour-head reveal">
            <div className="loja-tour-copy">
              <div className="sec-label light">Passeio pela loja</div>
              <h2 className="sec-title light">Conheça o ambiente da <em>Vida Pura</em></h2>
            </div>
            <p className="loja-tour-text">
              Uma sequência rápida para sentir a fachada, o interior e a identidade orgânica da mercearia antes da visita.
            </p>
          </div>
          <div className="loja-carousel reveal" aria-label="Fotos da loja Vida Pura">
            <div className="loja-carousel-stage">
              {STORE_SLIDES.map((slide, index) => (
                <figure key={slide.src} className={'loja-slide' + (index === active ? ' active' : '')} aria-hidden={index !== active}>
                  <img src={slide.src} alt={slide.alt} loading={index === 0 ? 'eager' : 'lazy'} style={{ objectPosition: slide.pos }} />
                  <figcaption className="loja-slide-caption">
                    <span className="loja-slide-kicker">{slide.kicker}</span>
                    <h3>{slide.title}</h3>
                    <p>{slide.text}</p>
                  </figcaption>
                </figure>
              ))}
              <div className="loja-carousel-dots">
                {STORE_SLIDES.map((slide, index) => (
                  <button
                    key={slide.kicker}
                    type="button"
                    className={'loja-carousel-dot' + (index === active ? ' active' : '')}
                    onClick={() => goTo(index)}
                    aria-label={`Mostrar foto: ${slide.title}`}
                    aria-current={index === active ? 'true' : undefined}
                  />
                ))}
              </div>
              <div className="loja-carousel-controls">
                <button type="button" className="loja-carousel-btn" onClick={prev} aria-label="Foto anterior">
                  <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
                </button>
                <button type="button" className="loja-carousel-btn" onClick={next} aria-label="Próxima foto">
                  <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" /></svg>
                </button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── APP ─── */
    function App() {
      const [scrolled, setScrolled] = useState(false);
      const [cart, setCart] = useState({}); // id -> { item, qty, obs? }
      const [cartOpen, setCartOpen] = useState(false);
      const [navMobOpen, setNavMobOpen] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      // Scroll reveal
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach((e, i) => {
            if (e.isIntersecting) { setTimeout(() => e.target.classList.add('vis'), i * 80); obs.unobserve(e.target); }
          });
        }, { threshold: .1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);

      // Toast on load
      useEffect(() => {
        setTimeout(() => showToast('🌿 Bem-vindo à Vida Pura Mercearia!'), 1200);
      }, []);

      useEffect(() => {
        document.body.style.overflow = navMobOpen ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [navMobOpen]);

      const addToCart = (item, qty = 1, opts) => {
        if (item?.esgotado) {
          showToast('Produto esgotado no momento');
          return;
        }
        setCart(c => {
          const prev = c[item.id];
          const nextQty = normalizeQty(item, (prev?.qty || 0) + normalizeQty(item, qty));
          const nextObs = opts && opts.obs !== undefined ? String(opts.obs) : (prev?.obs || '');
          return { ...c, [item.id]: { item, qty: nextQty, obs: nextObs } };
        });
      };

      const updateItemObs = (id, obs) => {
        setCart(c => {
          const cur = c[id];
          if (!cur) return c;
          return { ...c, [id]: { ...cur, obs: String(obs || '') } };
        });
      };

      const updateQty = (id, delta) => {
        setCart(c => {
          const cur = c[id];
          if (!cur) return c;
          const rawQty = cur.qty + delta;
          if (rawQty <= 0) { const n = { ...c }; delete n[id]; return n; }
          const nq = normalizeQty(cur.item, rawQty);
          return { ...c, [id]: { ...cur, qty: nq } };
        });
      };

      const removeItem = id => setCart(c => { const n = { ...c }; delete n[id]; return n; });
      const clearCart = () => { if (confirm('Limpar carrinho?')) { setCart({}); setCartOpen(false); } };

      const cartCount = Object.values(cart).reduce((s, i) => s + (isWeightedHortifruti(i.item) ? 1 : i.qty), 0);

      return (
        <>
          {/* NAV */}
          <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
            <div className="nav-logo">{INFO_LOJA.nome.split(" ").slice(0, 2).join(" ")} <span>{INFO_LOJA.nome.split(" ").slice(2).join(" ")}</span></div>
            <ul className="nav-links">
              {NAV_LINKS.map(([href, label]) => (
                <li key={href}><a href={href}>{label}</a></li>
              ))}
            </ul>
            <button type="button" className="nav-burger" aria-label="Abrir menu" onClick={() => setNavMobOpen(true)}>
              <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
          </nav>
          <div className={'nav-mobile-backdrop' + (navMobOpen ? ' open' : '')} onClick={() => setNavMobOpen(false)} />
          <div className={'nav-mobile-panel' + (navMobOpen ? ' open' : '')}>
            <button type="button" className="nav-mobile-close" onClick={() => setNavMobOpen(false)} aria-label="Fechar menu">✕</button>
            {NAV_LINKS.map(([href, label]) => (
              <a key={href} href={href} onClick={() => setNavMobOpen(false)}>{label}</a>
            ))}
          </div>

          {/* HERO */}
          <section className="hero" id="hero">
            <HeroParticles />
            <div className="hero-glow" />
            <div className="hero-body">
              <div className="hero-text">
                <p className="eyebrow">{INFO_LOJA.cidade}</p>
                <h1 className="hero-title">Vida Pura<br /><em>Mercearia</em></h1>
                <p className="hero-slogan">{INFO_LOJA.slogan}</p>
                <p className="hero-sub">{INFO_LOJA.descricao}</p>
                <a href="#loja" className="btn-cta">
                  <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" /></svg>
                  Ver Produtos
                </a>
              </div>
              <div className="hero-img-wrap">
                <div className="hero-img-frame">
                  <img src="images/Faixada.png" alt="Vida Pura Mercearia" />
                </div>
              </div>
            </div>
          </section>

          {/* STATS */}
          <StatBar />

          {/* SOBRE */}
          <section className="sobre" id="sobre">
            <div className="sobre-imgs reveal">
              <img className="sobre-img-main" src="images/DSC05491.jpg.jpeg" alt="Loja orgânica" />
              <img className="sobre-img-accent" src="images/Organicos.jpeg" alt="Produtos naturais" />
            </div>
            <div className="reveal">
              <div className="sec-label">Nossa história</div>
              <h2 className="sec-title">Um espaço feito com <em>propósito</em></h2>
              <p className="sobre-text">{INFO_LOJA.sobre1}</p>
              <p className="sobre-text">{INFO_LOJA.sobre2}</p>
              <div className="sobre-addr">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><circle cx="12" cy="11" r="3" /></svg>
                {INFO_LOJA.endereco}
              </div>
            </div>
          </section>

          {/* VALORES */}
          <section className="valores">
            <div className="reveal" style={{ textAlign: 'center' }}>
              <div className="sec-label" style={{ justifyContent: 'center' }}>Por que escolher</div>
              <h2 className="sec-title" style={{ marginBottom: 0 }}>O que nos <em>move</em></h2>
            </div>
            <div className="valores-grid">
              {[
                ['01', 'Certificação Orgânica', 'A maioria dos nossos produtos passam por rigoroso processo de certificação, garantindo que você receba o que é genuinamente orgânico.'],
                ['02', 'Agricultores Locais', 'Apoiamos produtores da região, valorizando o trabalho sustentável e fortalecendo a cadeia alimentar consciente.'],
                ['03', 'Bem-estar & Natureza', 'Acreditamos que a saúde começa no prato. Por isso, cuidamos de cada detalhe para transformar sua alimentação.'],
              ].map(([n, t, d]) => (
                <div key={n} className="val-card reveal">
                  <div className="val-num">{n}</div>
                  <h3>{t}</h3>
                  <p>{d}</p>
                </div>
              ))}
            </div>
          </section>

          {/* PASSEIO PELA LOJA */}
          <StoreCarousel />

          {/* SHOP */}
          <ShopSection cart={cart} onAdd={addToCart} onUpdateCart={updateQty} />

          {/* HORÁRIO */}
          <section className="horario" id="horario">
            <div className="reveal">
              <div className="sec-label light">Quando nos encontrar</div>
              <h2 className="sec-title light">Horário de <em>Funcionamento</em></h2>
              <ul className="hor-list">
                {HORARIOS.map(({ dia, horario, fechado }) => (
                  <li key={dia} className={'hor-item' + (fechado ? ' hor-fechado' : '')}>
                    <span className="hor-day">{dia}</span>
                    <span className="hor-time">{horario}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div className="hor-map reveal">
              <iframe src="https://www.google.com/maps?q=R.%20Ministro.%20Cal%C3%B3geras%2C%201514%20-%20Atiradores%2C%20Joinville%20-%20SC%2C%2089203-000&output=embed" title="Mapa" allowFullScreen loading="lazy" />
            </div>
          </section>

          {/* CONTATO */}
          <section className="contato" id="contato">
            <div className="sec-label reveal" style={{ justifyContent: 'center' }}>Fale conosco</div>
            <h2 className="sec-title reveal" style={{ marginBottom: 40 }}>Entre em <em>contato</em></h2>
            <div className="contact-btns reveal">
              <a href={`https://wa.me/${WA}`} className="btn-wa-big" target="_blank" rel="noopener noreferrer">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" /></svg>
                WhatsApp
              </a>
              <a href={INFO_LOJA.instagram} className="btn-ig" target="_blank" rel="noopener noreferrer">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" /></svg>
                Instagram
              </a>
            </div>
          </section>

          {/* ADDR BAR */}
          <div className="addr-bar">
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><circle cx="12" cy="11" r="3" /></svg>
            {INFO_LOJA.endereco} · {INFO_LOJA.telefone}
          </div>

          {/* FOOTER */}
          <footer>
            <div className="foot-logo">{INFO_LOJA.nome.split(" ")[0]} <span>{INFO_LOJA.nome.split(" ").slice(1).join(" ")}</span></div>
            <div className="foot-quote">{INFO_LOJA.slogan}</div>
            <div className="foot-copy">© 2025 {INFO_LOJA.nome}</div>
          </footer>

          {/* CART FAB */}
          <button className={`cart-fab${cartCount === 0 ? ' hide' : ''}`} onClick={() => setCartOpen(true)}>
            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 01-8 0" /></svg>
            {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
          </button>

          {/* CART DRAWER */}
          <div className={`overlay${cartOpen ? ' open' : ''}`} onClick={() => setCartOpen(false)} />
          <div className={`drawer${cartOpen ? ' open' : ''}`}>
            <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onUpdateQty={updateQty} onRemove={removeItem} onClear={clearCart} onUpdateObs={updateItemObs} />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
