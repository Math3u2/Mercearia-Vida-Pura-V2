<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vida Pura Mercearia — Orgânicos & Naturais</title>
  <link rel="icon" href="https://tse2.mm.bing.net/th/id/OIP.9DE1TGCVrJEd5LY8Ea3cPAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600;1,700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    :root {
      --vd: #1e3a2f;
      --vm: #2d5a3d;
      --vc: #4a7c59;
      --fo: #6b9e6e;
      --cr: #f5f0e8;
      --ar: #e8dfc8;
      --tc: #c4622d;
      --do: #c8a951;
      --tx: #1a1a18;
      --ts: #4a4a42;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cr);
      color: var(--tx);
      overflow-x: hidden
    }

    #root {
      min-height: 100vh
    }

    p,
    h1,
    h2,
    h3,
    label,
    .hero-sub,
    .sobre-text,
    .prato-desc,
    .val-card p,
    .form-hint,
    .order-summary,
    .foot-quote {
      overflow-wrap: normal;
      word-break: normal;
      hyphens: none;
      text-wrap: normal
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--ar)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--vc);
      border-radius: 3px
    }

    a,
    button,
    .cat-tab {
      cursor: pointer
    }

    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      transition: all .4s;
      border-bottom: 1px solid transparent
    }

    .nav.scrolled {
      background: rgba(30, 58, 47, .97);
      backdrop-filter: blur(12px);
      border-bottom-color: rgba(255, 255, 255, .06)
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--ar);
      letter-spacing: .12em;
      text-transform: uppercase
    }

    .nav-logo span {
      color: var(--do)
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none
    }

    .nav-links a {
      color: rgba(245, 240, 232, .6);
      text-decoration: none;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: color .3s
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--do)
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      background: var(--vd);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden
    }

    .hero-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1
    }

    .hero-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 80% 30%, rgba(74, 124, 89, .2) 0, transparent 60%), radial-gradient(ellipse 40% 60% at 10% 80%, rgba(107, 158, 110, .12) 0, transparent 50%);
      pointer-events: none;
      z-index: 1
    }

    .hero-body {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 100px 48px 80px;
      gap: 60px
    }

    .hero-text {
      flex: 1;
      animation: fadeUp .9s ease both;
      padding-left: 64px
    }

    .eyebrow {
      font-family: 'Manrope', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--fo);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--fo)
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.45rem, 7vw, 6.35rem);
      font-weight: 700;
      line-height: 1.02;
      color: var(--cr);
      margin-bottom: 18px
    }

    .hero-title em {
      font-style: italic;
      color: var(--do)
    }

    .hero-slogan {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.42rem;
      line-height: 1.35;
      color: var(--do);
      font-style: italic;
      font-weight: 600;
      margin-bottom: 24px;
      max-width: 520px
    }

    .hero-sub {
      font-family: 'Manrope', sans-serif;
      font-size: 1.08rem;
      line-height: 1.78;
      color: rgba(245, 240, 232, .68);
      max-width: 520px;
      margin-bottom: 40px;
      font-weight: 500
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--tc);
      color: #fff;
      padding: 16px 36px;
      text-decoration: none;
      font-family: 'Manrope', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: none;
      transition: all .3s;
      position: relative;
      overflow: hidden
    }

    .btn-cta::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, .1);
      transition: left .4s
    }

    .btn-cta:hover::before {
      left: 0
    }

    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(196, 98, 45, .4)
    }

    .hero-img-wrap {
      flex: 1.15;
      position: relative;
      animation: fadeUp .9s .2s ease both;
      margin-left: -28px;
      max-width: 820px;
      width: 100%
    }

    .hero-img-frame {
      position: relative;
      overflow: hidden;
      border-radius: 24px
    }

    .hero-img-frame::before {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid rgba(200, 169, 81, .3);
      z-index: 2;
      pointer-events: none
    }

    .hero-img-frame img {
      width: 100%;
      height: clamp(480px, 48vw, 640px);
      object-fit: cover;
      object-position: left center;
      display: block;
      filter: brightness(.88) saturate(.9)
    }

    .hero-badge {
      position: absolute;
      bottom: -20px;
      left: -20px;
      background: var(--do);
      color: var(--vd);
      padding: 18px 22px;
      font-family: 'Playfair Display', serif;
      font-size: .78rem;
      font-style: italic;
      max-width: 170px;
      line-height: 1.5;
      z-index: 3
    }

    /* Stats */
    .stats {
      background: var(--vm);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px
    }

    .stat-item {
      background: var(--vd);
      padding: 40px;
      text-align: center
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: var(--do);
      line-height: 1;
      margin-bottom: 8px
    }

    .stat-label {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, .45)
    }

    /* Section helpers */
    .sec-label {
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--vc);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .sec-label::before {
      content: '';
      width: 22px;
      height: 1px;
      background: currentColor
    }

    .sec-label.light {
      color: var(--fo)
    }

    .sec-label.light::before {
      background: var(--fo)
    }

    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      line-height: 1.15;
      color: var(--vd);
      margin-bottom: 20px
    }

    .sec-title em {
      font-style: italic;
      color: var(--tc)
    }

    .sec-title.light {
      color: var(--cr)
    }

    .sec-title.light em {
      color: var(--do)
    }

    /* Sobre */
    .sobre {
      padding: 110px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      background: var(--cr)
    }

    .sobre-imgs {
      position: relative
    }

    .sobre-img-main {
      width: 100%;
      height: 480px;
      object-fit: cover;
      display: block
    }

    .sobre-img-accent {
      position: absolute;
      bottom: -28px;
      right: -28px;
      width: 52%;
      height: 240px;
      object-fit: cover;
      border: 5px solid var(--cr);
      box-shadow: 0 16px 48px rgba(0, 0, 0, .12)
    }

    .sobre-text {
      font-size: .95rem;
      line-height: 1.85;
      color: var(--ts);
      font-weight: 300;
      margin-bottom: 14px
    }

    .sobre-addr {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: .8rem;
      color: var(--vc)
    }

    /* Shop tabs */
    .shop-wrap {
      background: var(--ar);
      padding: 0
    }

    .shop-tabs {
      display: flex;
      border-bottom: 2px solid var(--areia, #e8dfc8)
    }

    .shop-tab {
      flex: 1;
      padding: 22px;
      background: none;
      border: none;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--ts);
      cursor: pointer;
      transition: all .3s;
      position: relative;
      letter-spacing: .04em
    }

    .shop-tab.active {
      color: var(--vd);
      background: var(--cr)
    }

    .shop-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--do)
    }

    .shop-tab:hover {
      background: rgba(245, 240, 232, .5)
    }

    /* Loja */
    .loja {
      background: var(--cr);
      padding: 60px 48px
    }

    .toolbar {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      align-items: center
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative
    }

    .search-wrap input {
      width: 100%;
      padding: 13px 18px 13px 42px;
      border: 1.5px solid var(--ar);
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      color: var(--tx);
      outline: none;
      transition: border-color .3s;
      border-radius: 12px
    }

    .search-wrap input:focus {
      border-color: var(--vc)
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ts);
      pointer-events: none
    }

    .cat-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .cat-tab {
      padding: 9px 18px;
      border: 1.5px solid var(--ar);
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ts);
      cursor: pointer;
      transition: all .25s;
      border-radius: 20px
    }

    .cat-tab.active,
    .cat-tab:hover {
      background: var(--vd);
      border-color: var(--vd);
      color: #fff
    }

    .result-count {
      font-size: .8rem;
      color: var(--ts);
      margin-bottom: 20px
    }

    .result-count span {
      color: var(--vc);
      font-weight: 500
    }

    .produtos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 18px;
      margin-bottom: 40px
    }

    .prod-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      transition: all .35s cubic-bezier(.4, 0, .2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      cursor: pointer
    }

    .prod-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, .12)
    }

    .prod-card.esgotado {
      opacity: .64;
      filter: saturate(.62)
    }

    .prod-card.esgotado:hover {
      transform: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06)
    }

    .prod-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: center;
      display: block;
      padding: 0;
      background: linear-gradient(145deg, #f9f9f9 0%, #f0f0f0 100%);
      transition: transform .4s cubic-bezier(.4, 0, .2, 1)
    }

    .prod-card:hover .prod-img {
      transform: scale(1.05)
    }

    .prod-card.esgotado:hover .prod-img {
      transform: none
    }

    .prod-img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 16px 16px 0 0
    }

    .prod-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--vd);
      color: #fff;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 2
    }

    .prod-badge.esgotado-badge,
    .pd-stock-badge {
      background: var(--tc);
      color: #fff
    }

    .prod-fab {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--vc);
      color: #fff;
      border: 2.5px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 4px 14px rgba(74, 124, 89, .35);
      transition: all .3s cubic-bezier(.4, 0, .2, 1);
      font-size: 1.3rem;
      font-weight: 300;
      line-height: 1
    }

    .prod-fab:hover {
      background: var(--vd);
      transform: scale(1.12);
      box-shadow: 0 6px 20px rgba(74, 124, 89, .5)
    }

    .prod-fab.in-cart {
      background: var(--tc);
      box-shadow: 0 4px 14px rgba(196, 98, 45, .35)
    }

    .prod-fab.in-cart:hover {
      background: #a34d1f
    }

    .prod-fab:disabled,
    .pd-veja-fab:disabled {
      background: #9a9a92;
      box-shadow: none;
      cursor: not-allowed;
      transform: none
    }

    .prod-body {
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1
    }

    .prod-cat {
      font-size: .62rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--vc);
      margin-bottom: 6px;
      font-weight: 600
    }

    .prod-preco {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--vc);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 2px
    }

    .prod-preco .preco-cifrao {
      font-size: .8rem;
      font-weight: 600;
      color: var(--vc);
      margin-right: 2px
    }

    .prod-preco .preco-unit {
      font-size: .78rem;
      font-weight: 500;
      color: var(--ts)
    }

    .prod-nome {
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      color: var(--tx);
      line-height: 1.35;
      margin-bottom: 0;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: .02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .prod-unit {
      font-size: .68rem;
      color: var(--ts);
      margin-bottom: 0;
      font-weight: 400
    }

    .prod-add {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      margin-top: auto;
      padding-top: 10px
    }

    .prod-add .qty-ctrl {
      width: 100%;
      justify-content: space-between;
      border-radius: 10px;
      overflow: hidden
    }

    .qty-ctrl {
      display: flex;
      align-items: center;
      border: 1.5px solid rgba(74, 124, 89, .15);
      background: rgba(74, 124, 89, .04);
      border-radius: 10px
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--vc);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      font-weight: 600;
      border-radius: 8px
    }

    .qty-btn:hover {
      background: rgba(74, 124, 89, .15);
      color: var(--vd)
    }

    .qty-val {
      width: 30px;
      text-align: center;
      font-size: .82rem;
      font-weight: 600;
      color: var(--vd)
    }

    .qty-val.weight-val {
      width: auto;
      min-width: 54px;
      padding: 0 6px
    }

    .qty-gram-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: 64px;
      padding: 0 6px;
      font-size: .82rem;
      font-weight: 500;
      color: var(--tx)
    }

    .qty-gram-input {
      width: 44px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: right;
      outline: none;
      padding: 0
    }

    .qty-gram-unit {
      color: var(--vd);
      font-weight: 600
    }

    .add-btn {
      flex: 1;
      background: var(--vc);
      color: #fff;
      border: none;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s;
      border-radius: 10px;
      font-weight: 600
    }

    .add-btn:hover {
      background: var(--vd);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(30, 58, 47, .25)
    }

    .add-btn.added {
      background: var(--tc)
    }

    .add-btn:disabled,
    .qty-btn:disabled,
    .pd-qty-btn:disabled,
    .pd-add-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none
    }

    .stock-note {
      font-size: .68rem;
      color: var(--tc);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 8px
    }

    /* Product Detail Modal */
    .prod-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 7000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s
    }

    .prod-detail-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .prod-detail {
      position: fixed;
      top: 0;
      right: 0;
      width: 480px;
      max-width: 100vw;
      height: 100vh;
      background: #fff;
      z-index: 7001;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .4s cubic-bezier(.4, 0, .2, 1);
      box-shadow: -8px 0 48px rgba(0, 0, 0, .15);
      overflow-y: auto
    }

    .prod-detail.open {
      transform: translateX(0)
    }

    .pd-header {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(0, 0, 0, .06);
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2
    }

    .pd-back {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      color: var(--ts);
      transition: color .2s;
      padding: 0
    }

    .pd-back:hover {
      color: var(--vd)
    }

    .pd-back svg {
      width: 20px;
      height: 20px
    }

    .pd-header-title {
      flex: 1;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--tx)
    }

    .pd-img-wrap {
      width: 100%;
      background: linear-gradient(145deg, #f9f9f9, #f0f0f0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px
    }

    .pd-img-wrap img {
      max-width: 100%;

    const normalizarProdutoTexto = valor => String(valor || '')

    const CATEGORIAS_ESPECIAIS = [

    function categoriaEspecialProduto(texto) {
      const encontrada = CATEGORIAS_ESPECIAIS.find(([, palavras]) => contemAlgumaPalavra(texto, palavras));
      if (encontrada) return encontrada[0];
      if (texto.startsWith('tomate ')) return 'hortifruti';
      if (texto.startsWith('uva ')) return 'hortifruti';
      return '';
    }

    function categoriaDoProduto(nome, unidade) {
      const texto = normalizarProdutoTexto(nome) + ' ' + normalizarProdutoTexto(unidade);
      const especial = categoriaEspecialProduto(texto);
      if (especial) return especial;
      const encontrada = PALAVRAS_CATEGORIAS.find(([, palavras]) => contemAlgumaPalavra(texto, palavras));
      return encontrada ? encontrada[0] : 'outros';
    }

    function unidadeDoProduto(unidade) {
      return normalizarProdutoTexto(unidade) === 'nan' ? 'UNID' : unidade;
    }

    const HORTI_SUBCATS = [
      { id: 'todos', label: 'Todos' },

    function hortifrutiSubcategoria(nome) {
      const t = normalizarProdutoTexto(nome);
      if (contemAlgumaPalavra(t, HORTI_VERDURAS_KW)) return 'verduras';
      if (t.includes('couve') && !t.includes('flor')) return 'verduras';
      if (contemAlgumaPalavra(t, HORTI_LEGUMES_KW)) return 'legumes';
      if (contemAlgumaPalavra(t, HORTI_FRUTAS_KW)) return 'frutas';
      return 'outros';
    }

    function buildProducts() {
      return PRODUTOS.map((entry, index) => {
        const { produto, img, img2, ingredientes, contemGluten, info, esgotado } = entry;
        const [nome, unidadeOriginal, preco, badge] = produto;
        const nomeLimpo = String(nome || '').trim();
        const unidade = unidadeDoProduto(unidadeOriginal);
        const badgeFinal = badge || (normalizarProdutoTexto(nomeLimpo).includes('organico') ? 'Orgânico' : '');

        return {
          id: index + 1,
          cat: categoriaDoProduto(nomeLimpo, unidade),
          nome: nomeLimpo,
          unidade,
          preco: Number(preco) || 0,
          img: img || FALLBACK_PRODUCT_IMAGE,
          img2: img2 || '',
          ingredientes: ingredientes || '',
          info: info || '',
          contemGluten: contemGluten === true ? true : contemGluten === false ? false : null,
          badge: badgeFinal,
          esgotado: esgotado === true,
        };
      });
    }

    const ALL_PRODUCTS = buildProducts().filter(p => p.cat === 'hortifruti');

    // 🔒 Forçar: mostrar apenas Hortifruti (remove qualquer outra categoria)
    const ONLY_HORTIFRUTI = true;

    /* ─── UTILS ─── */
    const fmtBRL = v => 'R$ ' + v.toFixed(2).replace('.', ',');
    const onlyDigits = v => (v || '').replace(/\D/g, '');
    const normalizeText = v => (v || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    const formatCEP = v => {
      const d = onlyDigits(v).slice(0, 8);
      return d.length > 5 ? d.slice(0, 5) + '-' + d.slice(5) : d;
    };
    const formatPhone = v => {
      const d = onlyDigits(v).slice(0, 11);
      if (d.length <= 2) return d;
      if (d.length <= 6) return `(${d.slice(0, 2)}) ${d.slice(2)}`;
      if (d.length <= 10) return `(${d.slice(0, 2)}) ${d.slice(2, 6)}-${d.slice(6)}`;
      return `(${d.slice(0, 2)}) ${d.slice(2, 7)}-${d.slice(7)}`;
    };
    const parseTimeToMin = s => {
      const m = /^(\d{1,2}):(\d{2})$/.exec(String(s || '').trim());
      if (!m) return null;
      const hh = Number(m[1]), mm = Number(m[2]);
      if (Number.isNaN(hh) || Number.isNaN(mm) || hh > 23 || mm > 59) return null;
      return hh * 60 + mm;
    };
    const LOJA_JANELA_MIN = 8 * 60 + 30;
    const LOJA_JANELA_MAX = 18 * 60 + 30;
    const isJoinville = cidade => normalizeText(cidade) === 'joinville';
    const findCidadeEntrega = cidade => CIDADES_ENTREGA.find(c => normalizeText(c.cidade) === normalizeText(cidade));
    const isAlmocoItem = item => String(item.id).startsWith('p');
    const isWeightedHortifruti = item => item?.cat === 'hortifruti' && normalizeText(item?.unidade) === 'kg';
    const isAboboraKgHorti = item => isWeightedHortifruti(item) && normalizeText(item?.nome || '').includes('abobora');
    const getQtyStep = item => isWeightedHortifruti(item) ? 0.1 : 1;
    const getMinQty = item => {
      if (isWeightedHortifruti(item)) return isAboboraKgHorti(item) ? 0.5 : 0.1;
      return 1;
    };
    const normalizeQty = (item, qty) => {
      const raw = Number(qty) || 0;
      if (isWeightedHortifruti(item)) {
        const rounded = Math.round(raw * 1000) / 1000;
        return Math.max(getMinQty(item), rounded);
      }
      return Math.max(1, Math.round(raw));
    };
    const gramsToQty = (item, grams) => normalizeQty(item, Number(grams) / 1000);
    const qtyToGrams = (item, qty) => Math.round(normalizeQty(item, qty) * 1000);
    const formatQty = (item, qty) => {
      if (!isWeightedHortifruti(item)) return String(Math.round(qty));
      const safe = normalizeQty(item, qty);
      if (safe < 1) return `${Math.round(safe * 1000)}g`;
      const kg = Number.isInteger(safe) ? String(safe) : String(safe).replace('.', ',');
      return `${kg}kg`;
    };
    const formatUnitPrice = item => fmtBRL(item.preco) + (isWeightedHortifruti(item) ? '/kg' : '');
    const findFrete = (bairro, cidade) => {
      const bairroNorm = normalizeText(bairro);
      const cidadeNorm = normalizeText(cidade);
      const cidadeDireta = findCidadeEntrega(cidade);
      if (cidadeDireta && cidadeDireta.valor !== null) {
        return { bairro: cidadeDireta.cidade, valor: cidadeDireta.valor };
      }
      const cidadeMatch = FRETES.find(f => normalizeText(f.bairro) === cidadeNorm);
      if (cidadeNorm && !isJoinville(cidadeNorm) && cidadeMatch) return cidadeMatch;
      const terms = [bairroNorm, cidadeNorm].filter(Boolean);
      for (const term of terms) {
        const exact = FRETES.find(f => normalizeText(f.bairro) === term);
        if (exact) return exact;
      }
      for (const term of terms) {
        const partial = FRETES.find(f => {
          const b = normalizeText(f.bairro);
          return b.length > 4 && (b.includes(term) || term.includes(b));
        });
        if (partial) return partial;
      }
      return null;
    };
    const copyText = async text => {
      try {
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error('clipboard indisponivel');
        }
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);

    /* ─── HOOKS ─── */
    function useCounter(target, started) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!started) return;
        let cur = 0;
        const step = Math.ceil(target / 60);
        const t = setInterval(() => {
          cur = Math.min(cur + step, target);
          setVal(cur);
          if (cur >= target) clearInterval(t);
        }, 25);
        return () => clearInterval(t);
      }, [started, target]);
      return val;
    }

    /* ─── COMPONENTS ─── */
    function HeroParticles() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
        resize();
        window.addEventListener('resize', resize);
        const N = 20;
        const leaves = Array.from({ length: N }, () => ({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: 2 + Math.random() * 3, sx: -.3 + Math.random() * .6,
          sy: .2 + Math.random() * .45, op: .06 + Math.random() * .14,
          w: Math.random() * Math.PI * 2, ws: .008 + Math.random() * .01,
        }));
        let raf;
        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          leaves.forEach(l => {
            l.x += l.sx + Math.sin(l.w) * .25; l.y += l.sy; l.w += l.ws;
            if (l.y > canvas.height + 10) { l.y = -10; l.x = Math.random() * canvas.width; }
            if (l.x < -10) l.x = canvas.width + 10; if (l.x > canvas.width + 10) l.x = -10;
            ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.w);
            ctx.beginPath(); ctx.ellipse(0, 0, l.r * 2.2, l.r, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(107,158,110,${l.op})`; ctx.fill(); ctx.restore();
          });
          raf = requestAnimationFrame(draw);
        };
        draw();
        return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(raf); };
      }, []);
      return <canvas ref={canvasRef} className="hero-canvas" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />;
    }

    function StatBar() {
      const ref = useRef(null);
      const [started, setStarted] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setStarted(true); obs.disconnect(); } }, { threshold: .5 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      const v1 = useCounter(CONTADORES.certificados, started);
      const v2 = useCounter(CONTADORES.agricultores, started);
      const v3 = useCounter(CONTADORES.produtos, started);
      return (
        <div className="stats" ref={ref}>
          <div className="stat-item"><div className="stat-num">{v1}%</div><div className="stat-label">Orgânicos Certificados</div></div>

                      {c.label}
                    </button>
                  ))}
                </div>
                {cat === 'hortifruti' && (
                  <div className="horti-sub-tabs cat-tabs" style={{ width: '100%' }}>
                    {HORTI_SUBCATS.map(h => (
                      <button key={h.id} type="button" className={`cat-tab${hortiSub === h.id ? ' active' : ''}`} onClick={() => { setHortiSub(h.id); setPage(1); }}>
                        {h.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="result-count">Exibindo <span>{pageProd.length}</span> de <span>{filtered.length}</span> produtos</div>
              <div className="produtos-grid">
                {pageProd.map(p => (
                  <ProductCard key={p.id} p={p} cartQty={cart[p.id]?.qty || 0} onAdd={onAdd} onOpen={setSelectedProduct} />
                ))}
              </div>
              {totalPags > 1 && (
                <div className="paginacao">
                  <button className="pag-btn" disabled={page === 1} onClick={() => { setPage(p => p - 1); scrollGrid(); }}>‹</button>
                  {(() => {
                    const pages = [];
                    if (totalPags <= 7) {
                      for (let i = 1; i <= totalPags; i++) pages.push(i);
                    } else {
                      pages.push(1);
                      const start = Math.max(2, page - 2);
                      const end = Math.min(totalPags - 1, page + 2);
                      if (start > 2) pages.push('...');
                      for (let i = start; i <= end; i++) pages.push(i);
                      if (end < totalPags - 1) pages.push('...');
                      pages.push(totalPags);
                    }
                    return pages.map((pg, idx) =>
                      pg === '...'
                        ? <span key={'el' + idx} style={{ width: 36, textAlign: 'center', color: 'var(--ts)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>…</span>
                        : <button key={pg} className={`pag-btn${page === pg ? ' active' : ''}`} onClick={() => { setPage(pg); scrollGrid(); }}>{pg}</button>
                    );
                  })()}
                  <button className="pag-btn" disabled={page === totalPags} onClick={() => { setPage(p => p + 1); scrollGrid(); }}>›</button>
                </div>
              )}
            </div>
          )}
          {tab === 'almoco' && (
            <div className="almoco-wrap">
              <div className="almoco-intro">
                <div>
                  <div className="sec-label">Cardápio de Almoço</div>
                  <h2 className="sec-title">Almoço Orgânico</h2>
                  <p style={{ fontSize: '.95rem', lineHeight: 1.8, color: 'var(--ts)', fontWeight: 300, marginBottom: 20 }}>
                    Pratos servidos das 11:30 às 14:00h. Entrega de almoço apenas em Joinville; retirada disponível para outras cidades.
                  </p>
                  <div style={{ marginTop: 14, marginBottom: 8, padding: '12px 14px', background: 'rgba(74,124,89,.1)', border: '1px solid rgba(74,124,89,.28)', borderRadius: 12, fontSize: '.82rem', lineHeight: 1.65, color: 'var(--ts)' }}>
                    <strong style={{ color: 'var(--vd)', display: 'block', marginBottom: 6, fontSize: '.72rem', letterSpacing: '.1em', textTransform: 'uppercase' }}>Horário do restaurante</strong>
                    {HORARIO_RESTAURANTE_ALMOCO}
                  </div>
                </div>
                <img src={PRATOS[0].img} alt="Almoço orgânico" style={{ width: '100%', height: 340, objectFit: 'cover' }} />
              </div>
              {ALMOCO_CATEGORIES.map(category => (
                groupedPratos[category]?.length > 0 && (
                  <div key={category} style={{ marginTop: 36 }}>
                    <div className="sec-label light">{category}</div>
                    {category === 'Bebidas' && (
                      <p style={{ fontSize: '.92rem', color: 'var(--ts)', margin: '12px 0 18px', lineHeight: 1.7 }}>
                        Kombuchas disponíveis em garrafas de 300ml. Consulte sabores e marcas.
                      </p>
                    )}
                    <div className="produtos-grid">
                      {groupedPratos[category].map(p => (
                        <PratoCard key={p.id} p={p} cartQty={cart[p.id]?.qty || 0} onAdd={onAdd} onOpen={setSelectedProduct} />
                      ))}
                    </div>
                  </div>
                )
              ))}
            </div>
          )}
          {selectedProduct && (
            <ProductDetail
              p={selectedProduct}
              cart={cart}
              onAdd={onAdd}
              onClose={() => setSelectedProduct(null)}
              onOpenProduct={setSelectedProduct}
            />
          )}
        </section>
      );
    }

    function CartDrawer({ cart, onClose, onUpdateQty, onRemove, onClear, onUpdateObs }) {
      const [step, setStep] = useState('cart'); // 'cart' | 'checkout'
      const [form, setForm] = useState({
        nome: '', telefone: '', tipoEntrega: 'entrega', retiradaHora: '', entregaHora: '', maquinaCartao: '',
        cep: '', rua: '', numero: '', bairro: '', cidade: 'Joinville', uf: 'SC', complemento: '', pagamento: 'pix', troco: '', obs: '',
      });
      const [cepLoading, setCepLoading] = useState(false);
      const [frete, setFrete] = useState(null);
      const [freteBairro, setFreteBairro] = useState('');

      const items = Object.values(cart);
      const hasAlmoco = items.some(({ item }) => isAlmocoItem(item));
      const isRetirada = form.tipoEntrega === 'retirada';
      const subtotal = items.reduce((s, i) => s + i.item.preco * i.qty, 0);
      const total = subtotal + (isRetirada ? 0 : (frete || 0));

      const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const resetFrete = () => { setFrete(null); setFreteBairro(''); };
      const setEnderecoF = (k, v) => {
        resetFrete();
        setForm(f => ({ ...f, [k]: v }));
      };
      const setTipoEntrega = tipo => {
        resetFrete();
        setForm(f => ({
          ...f,
          tipoEntrega: tipo,
          cidade: f.cidade || 'Joinville',
          uf: f.uf || 'SC',
        }));
      };
      const setCidade = cidade => {
        resetFrete();
        setForm(f => ({ ...f, cidade, uf: 'SC' }));
      };
      const setPagamento = id => setForm(f => ({
        ...f,
        pagamento: id,
        troco: id === 'dinheiro' ? f.troco : '',
        maquinaCartao: id === 'cartao' ? (f.maquinaCartao || '') : '',
      }));

      const aplicarFrete = (match, silent = false) => {
        if (!match) {
          setFrete(null);
          setFreteBairro('');
          if (!silent) showToast('⚠️ Bairro fora da tabela de frete');
          return false;
        }
        setFrete(match.valor);
        setFreteBairro(match.bairro);
        if (!silent) showToast('🚚 Frete calculado: ' + fmtBRL(match.valor));
        return true;
      };

      const calcularFrete = () => {
        if (isRetirada) {
          resetFrete();
          showToast('Retirada na loja sem frete');
          return true;
        }
        if (hasAlmoco && !isJoinville(form.cidade)) {
          resetFrete();
          showToast('⚠️ Almoço com entrega apenas em Joinville');
          return false;
        }
        return aplicarFrete(findFrete(form.bairro, form.cidade));
      };

      const buscarCep = async cepValue => {
        const digits = onlyDigits(cepValue || form.cep);
        if (digits.length !== 8) {
          showToast('⚠️ Digite um CEP válido');
          return;
        }
        setCepLoading(true);
        try {
          const res = await fetch(`https://viacep.com.br/ws/${digits}/json/`);
          const data = await res.json();
          if (data.erro) {
            showToast('⚠️ CEP não encontrado');
            return;
          }
          const nextBairro = data.bairro || '';
          const nextCidade = data.localidade || '';
          setForm(f => ({
            ...f,
            cep: formatCEP(digits),
            rua: data.logradouro || f.rua,
            bairro: nextBairro || f.bairro,
            cidade: nextCidade || f.cidade,
            uf: data.uf || '',
          }));
          if (!(hasAlmoco && !isJoinville(nextCidade))) {
            aplicarFrete(findFrete(nextBairro, nextCidade), true);
          }
          showToast('Endereço preenchido pelo CEP');
        } catch {
          showToast('⚠️ Não foi possível buscar o CEP');
        } finally {
          setCepLoading(false);
        }
      };

      const handleCepChange = e => {
        const cep = formatCEP(e.target.value);
        resetFrete();
        setF('cep', cep);
        if (onlyDigits(cep).length === 8) buscarCep(cep);
      };

      const formatTroco = value => {
        const clean = value.trim();
        if (!clean) return 'Não precisa de troco';
        return clean.toLowerCase().startsWith('r$') ? clean : 'R$ ' + clean;
      };

      const enviarWA = () => {
        if (!form.nome || onlyDigits(form.telefone).length < 10) {
          showToast('⚠️ Preencha nome e telefone');
          return;
        }
        let freteFinal = null;
        if (isRetirada) {
          if (!form.retiradaHora) {
            showToast('⚠️ Informe o horário da retirada');
            return;
          }
          const tm = parseTimeToMin(form.retiradaHora);
          if (tm === null || tm < LOJA_JANELA_MIN || tm > LOJA_JANELA_MAX) {
            showToast('⚠️ Retirada somente entre 08:30 e 18:30 (horário da loja).');
            return;
          }
        } else {
          if (!form.cep || !form.rua || !form.numero || !form.bairro || !form.cidade) {
            showToast('⚠️ Preencha CEP, número e endereço');
            return;
          }
          if (hasAlmoco && !isJoinville(form.cidade)) {
            showToast('⚠️ Almoço com entrega apenas em Joinville');
            return;
          }
          if (form.entregaHora) {
            const te = parseTimeToMin(form.entregaHora);
            if (te === null || te < LOJA_JANELA_MIN || te > LOJA_JANELA_MAX) {
              showToast('⚠️ Horário de entrega preferencial entre 08:30 e 18:30.');
              return;
            }
          }
          if (form.pagamento === 'cartao' && !form.maquinaCartao) {
            showToast('⚠️ Informe se precisa de máquina de cartão na entrega');
            return;
          }
          freteFinal = frete !== null ? { bairro: freteBairro || form.bairro || form.cidade, valor: frete } : findFrete(form.bairro, form.cidade);
          if (!freteFinal) {
            showToast('⚠️ Calcule o frete antes de finalizar');
            return;
          }
          if (frete === null) aplicarFrete(freteFinal, true);
        }
        const totalFinal = subtotal + (freteFinal ? freteFinal.valor : 0);
        const pagLabel = { pix: 'PIX', cartao: 'Cartão na Entrega', dinheiro: 'Dinheiro na Entrega', voucher: 'Voucher' }[form.pagamento];
        let msg = `🌿 *PEDIDO — Vida Pura Mercearia*\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
        msg += `💬 *Finalize pelo WhatsApp:* confirmamos estoque, horário exato e *forma de pagamento* (PIX, cartão ou dinheiro) diretamente na conversa com a loja.\n\n`;
        msg += `👤 *Cliente:* ${form.nome}\n`;
        msg += `📱 *Telefone:* ${form.telefone}\n`;
        msg += `🚚 *Tipo:* ${isRetirada ? 'Retirada na loja' : 'Entrega'}\n`;
        if (isRetirada) {
          msg += `⏰ *Horário da retirada:* ${form.retiradaHora}\n`;
          msg += `🏙️ *Cidade:* ${form.cidade || 'Não informada'}\n`;
          msg += `🏬 *Retirada em:* ${INFO_LOJA.endereco}\n`;
        } else {
          msg += `📮 *CEP:* ${form.cep}\n`;
          msg += `📍 *Endereço:* ${form.rua}, ${form.numero} - ${form.bairro}${form.cidade ? ', ' + form.cidade : ''}${form.uf ? '/' + form.uf : ''}\n`;
          if (form.complemento) msg += `🏠 *Complemento:* ${form.complemento}\n`;
          if (form.entregaHora) msg += `⏰ *Preferência de horário da entrega:* ${form.entregaHora}\n`;
          if (form.pagamento === 'cartao') {
            msg += `💳 *Máquina de cartão na entrega:* ${form.maquinaCartao === 'sim' ? 'Sim, preciso' : 'Não preciso / outro meio'}\n`;
          }
        }
        msg += `💳 *Pagamento (preferência):* ${pagLabel}\n`;
        if (form.pagamento === 'dinheiro') msg += `💵 *Troco para:* ${formatTroco(form.troco)}\n`;
        if (form.obs) msg += `📝 *Obs. gerais:* ${form.obs}\n`;
        msg += `\n━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `📦 *ITENS DO PEDIDO*\n\n`;
        const sorted = [...items].sort((a, b) => a.item.nome.localeCompare(b.item.nome));
        sorted.forEach(({ item, qty, obs }, idx) => {
          const sub = item.preco * qty;
          msg += `${idx + 1}. *${item.nome}* (${item.unidade})\n`;
          msg += `   ${formatQty(item, qty)} × ${formatUnitPrice(item)} = *${fmtBRL(sub)}*\n`;
          if (obs && String(obs).trim()) msg += `   📝 ${String(obs).trim()}\n`;
          msg += `\n`;
        });
        msg += `━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `🧾 *Subtotal:* ${fmtBRL(subtotal)}\n`;
        msg += isRetirada ? `🏬 *Retirada:* ${fmtBRL(0)}\n` : `🚚 *Frete (${freteFinal.bairro}):* ${fmtBRL(freteFinal.valor)}\n`;
        msg += `💰 *TOTAL: ${fmtBRL(totalFinal)}*\n`;
        if (form.pagamento === 'pix') msg += `\n🔑 Chave PIX: *${PIX_KEY}*\n`;
        msg += `\nAguardo confirmação do pedido. Obrigado! 😊`;
        window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
      };

      return (
        <>
          <div className="drawer-head">
            <h3>{step === 'cart' ? 'Seu Pedido' : 'Finalizar Pedido'}</h3>
            {step === 'checkout'
              ? <button className="btn-back" onClick={() => setStep('cart')} title="Voltar">
                <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5" /><path d="m12 19-7-7 7-7" /></svg>
                Voltar
              </button>
              : <button className="close-btn" onClick={onClose} title="Fechar">✕</button>
            }
          </div>

          {step === 'cart' && (
            <>
              <div className="cart-items">
                {items.length === 0
                  ? <div className="cart-empty-msg"><div>🛒</div>Seu carrinho está vazio</div>
                  : items.map(({ item, qty, obs }) => (
                    <div key={item.id} className="cart-item">
                      <img src={item.img} alt={item.nome} onError={e => { e.currentTarget.onerror = null; e.currentTarget.src = FALLBACK_PRODUCT_IMAGE; }} />
                      <div className="ci-info">
                        <div className="ci-nome">{item.nome}</div>
                        <div className="ci-preco">{formatUnitPrice(item)} × {formatQty(item, qty)} = {fmtBRL(item.preco * qty)}</div>
                        {item.cat === 'hortifruti' && (
                          <div className="ci-obs">
                            <input
                              placeholder="Obs.: mais maduro, mais verde, tamanho..."
                              value={obs || ''}
                              onChange={e => onUpdateObs && onUpdateObs(item.id, e.target.value)}
                            />
                          </div>
                        )}
                      </div>
                      <div className="ci-ctrl">
                        <button className="ci-btn" onClick={() => onUpdateQty(item.id, -getQtyStep(item))}>−</button>
                        <span className={`ci-qty${isWeightedHortifruti(item) ? ' weight-val' : ''}`}>{formatQty(item, qty)}</span>
                        <button className="ci-btn" onClick={() => onUpdateQty(item.id, getQtyStep(item))}>+</button>
                        <button className="ci-btn rm" onClick={() => onRemove(item.id)}>✕</button>
                      </div>
                    </div>
                  ))
                }
              </div>
              <div className="cart-foot">
                <div className="cart-total-row">
                  <span className="cart-total-label">Total estimado</span>
                  <span className="cart-total-val">{fmtBRL(subtotal)}</span>
                </div>
                {items.length > 0 && (
                  <button className="btn-checkout" onClick={() => setStep('checkout')}>
                    Continuar → Dados de Entrega
                  </button>
                )}
                <button className="btn-clear" onClick={onClear}>Limpar carrinho</button>
              </div>
            </>
          )}

          {step === 'checkout' && (
            <>
              <div className="checkout-form">
                <div className="checkout-wa-note">
                  O envio abre o WhatsApp com o resumo do pedido. A equipe confirma valores, trocos e <strong>pagamento</strong> (PIX, cartão ou dinheiro) na conversa — o pedido só vale após essa confirmação.
                </div>
                <div className="form-group">
                  <label>Nome completo *</label>
                  <input value={form.nome} onChange={e => setF('nome', e.target.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, ''))} placeholder="Seu nome" />
                </div>
                <div className="form-group">
                  <label>Telefone *</label>
                  <input type="tel" inputMode="numeric" maxLength="15" value={form.telefone} onChange={e => setF('telefone', formatPhone(e.target.value))} placeholder="(47) 9 0000-0000" />
                </div>
                <div className="form-group">
                  <label>Entrega ou retirada</label>
                  <div className="tipo-entrega-opts">
                    {[
                      { id: 'entrega', label: 'Entrega', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 17h4V5H2v12h3" /><path d="M14 8h4l4 4v5h-3" /><circle cx="7.5" cy="17.5" r="2.5" /><circle cx="16.5" cy="17.5" r="2.5" /></svg> },
                      { id: 'retirada', label: 'Retirada', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9h18l-2-5H5Z" /><path d="M5 9v11h14V9" /><path d="M9 13h6" /></svg> },
                    ].map(opt => (
                      <button type="button" key={opt.id} className={`tipo-entrega-opt${form.tipoEntrega === opt.id ? ' selected' : ''}`} onClick={() => setTipoEntrega(opt.id)}>
                        {opt.icon}{opt.label}
                      </button>
                    ))}
                  </div>
                  {hasAlmoco && !isRetirada && <span className="form-hint">Almoço com entrega apenas em Joinville.</span>}
                </div>

                {isRetirada ? (
                  <>
                    <div className="form-row">
                      <div className="form-group">
                        <label>Horário da retirada *</label>
                        <input type="time" min="08:30" max="18:30" step="300" value={form.retiradaHora} onChange={e => setF('retiradaHora', e.target.value)} />
                      </div>
                      <div className="form-group">
                        <label>Cidade</label>
                        <select value={form.cidade} onChange={e => setCidade(e.target.value)}>
                          {CIDADES_ENTREGA.map(c => <option key={c.cidade} value={c.cidade}>{c.cidade}</option>)}
                        </select>
                      </div>
                    </div>
                    <span className="form-hint">Retirada na loja sem cobrança de frete. Segunda a sexta: escolha um horário entre <strong>08:30</strong> e <strong>18:30</strong> (fechamento da loja).</span>
                  </>
                ) : (
                  <>
                    <div className="form-row">
                      <div className="form-group">
                        <label>CEP *</label>
                        <input inputMode="numeric" maxLength="9" value={form.cep} onChange={handleCepChange} placeholder="89203-000" />
                        <span className="form-hint">{cepLoading ? 'Buscando endereço...' : 'Rua e bairro são preenchidos pelo CEP.'}</span>
                      </div>
                      <div className="form-group">
                        <label>Número *</label>
                        <input inputMode="numeric" value={form.numero} onChange={e => setF('numero', onlyDigits(e.target.value).slice(0, 6))} placeholder="Insira o número" />
                      </div>
                    </div>
                    <div className="form-group">
                      <label>Rua *</label>
                      <input value={form.rua} onChange={e => setF('rua', e.target.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, ''))} placeholder="Rua" />
                    </div>
                    <div className="form-row">
                      <div className="form-group">
                        <label>Bairro *</label>
                        <input list="frete-bairros" value={form.bairro} onChange={e => setEnderecoF('bairro', e.target.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, ''))} placeholder="Bairro" />
                      </div>
                      <div className="form-group">
                        <label>Cidade *</label>
                        <select value={form.cidade} onChange={e => setCidade(e.target.value)}>
                          {CIDADES_ENTREGA.map(c => <option key={c.cidade} value={c.cidade}>{c.cidade}</option>)}
                        </select>
                      </div>
                    </div>
                    <datalist id="frete-bairros">
                      {FRETES.map(f => <option key={f.bairro} value={f.bairro} />)}
                    </datalist>
                    <div className="form-group">
                      <label>Complemento</label>
                      <textarea rows="2" value={form.complemento} onChange={e => setF('complemento', e.target.value)} placeholder="Apto, bloco, referência..." />
                    </div>
                    <div className="form-group">
                      <label>Preferência de horário da entrega</label>
                      <input type="time" min="08:30" max="18:30" step="300" value={form.entregaHora} onChange={e => setF('entregaHora', e.target.value)} />
                      <span className="form-hint">As entregas acontecerão em horário comercial, das 8:30 ás 18:30. Nos sábados, serão somente das 09:00h ás 14:00h
                      </span>
                    </div>
                    <div className="form-group">
                      <label>Frete</label>
                      <button type="button" className="btn-frete" onClick={calcularFrete}>
                        Calcular o frete
                      </button>
                      {frete !== null
                        ? <div className="frete-info"><span>Entrega para <strong>{freteBairro}</strong></span><strong>{fmtBRL(frete)}</strong></div>
                        : <span className="form-hint">O frete será somado ao total do pedido.</span>
                      }
                    </div>
                  </>
                )}
                <div className="form-group">
                  <label>Forma de pagamento</label>
                  <div className="pagamento-opts">
                    {[
                      { id: 'pix', label: 'PIX', icon: <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.354 2.646a.9.9 0 0 1 1.292 0l2.122 2.122a.9.9 0 0 1 0 1.278l-2.122 2.12a.9.9 0 0 1-1.292 0L9.232 6.046a.9.9 0 0 1 0-1.278zm0 9.908a.9.9 0 0 1 1.292 0l2.122 2.122a.9.9 0 0 1 0 1.278l-2.122 2.12a.9.9 0 0 1-1.292 0L9.232 15.95a.9.9 0 0 1 0-1.278zM6.046 9.232a.9.9 0 0 1 1.278 0l2.122 2.122a.9.9 0 0 1 0 1.292L7.324 14.77a.9.9 0 0 1-1.278 0l-2.12-2.124a.9.9 0 0 1 0-1.292zm9.908 0a.9.9 0 0 1 1.278 0l2.124 2.122a.9.9 0 0 1 0 1.292l-2.124 2.124a.9.9 0 0 1-1.278 0l-2.122-2.124a.9.9 0 0 1 0-1.292z" /></svg> },
                      { id: 'cartao', label: 'Cartão', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="5" width="20" height="14" rx="2" /><line x1="2" y1="10" x2="22" y2="10" /></svg> },
                      { id: 'dinheiro', label: 'Dinheiro', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="12" rx="2" /><circle cx="12" cy="12" r="3" /></svg> },
                      { id: 'voucher', label: 'Voucher', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4Z" /><path d="M13 7v2" /><path d="M13 15v2" /><path d="M13 11v2" /></svg> },
                    ].map(opt => (
                      <button type="button" key={opt.id} className={`pag-opt${form.pagamento === opt.id ? ' selected' : ''}`} onClick={() => setPagamento(opt.id)}>
